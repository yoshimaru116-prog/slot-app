<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ボーナスルーレット</title>

<style>
body {
  text-align: center;
  font-family: sans-serif;
  background: #111;
  color: #fff;
}

.container {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 30px;
}

.slot {
  width: 180px;
  height: 80px;
  border: 4px solid #fff;
  overflow: hidden;
  background: #000;
  position: relative;
}

.reel {
  position: absolute;
  width: 100%;
  top: 0;
}

.item {
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  padding: 0;
}

textarea {
  width: 160px;
  height: 120px;
}

button {
  margin: 10px;
  padding: 10px 20px;
  cursor: pointer;
}

#result {
  margin-top: 20px;
  font-size: 20px;
  font-weight: bold;
}

/* 履歴 */
#history {
  margin-top: 10px;
  max-width: 400px;
  margin-left: auto;
  margin-right: auto;
  text-align: left;
}

.history-item {
  background: #222;
  padding: 8px;
  margin: 4px 0;
  border-radius: 6px;
  font-size: 14px;
}

/* 📱スマホ対応 */
@media (max-width: 600px) {
  .slot {
    width: 100px;
    height: 60px;
  }

  .item {
    height: 60px;
    font-size: 14px;
  }

  button {
    width: 80%;
    max-width: 300px;
    font-size: 16px;
    padding: 12px;
  }

  textarea {
    width: 90%;
    height: 80px;
  }
}
</style>
</head>

<body>

<h1>🎰 文字ルーレット</h1>

<!-- スロット -->
<div class="container">
  <div class="slot"><div class="reel" id="reel1"></div></div>
  <div class="slot"><div class="reel" id="reel2"></div></div>
  <div class="slot"><div class="reel" id="reel3"></div></div>
</div>

<button onclick="spin()">スタート</button>
<div id="result">結果：---</div>

<!-- 履歴 -->
<h2>履歴</h2>
<div id="history"></div>
<button onclick="clearHistory()">履歴クリア</button>

<!-- 入力 -->
<div style="margin-top:40px;">
  <p>リール1</p>
  <textarea id="input1"></textarea>

  <p>リール2</p>
  <textarea id="input2"></textarea>

  <p>リール3</p>
  <textarea id="input3"></textarea><br>

  <button onclick="saveItems()">保存</button>
  <button onclick="clearItems()">リセット</button>
</div>

<script>
let itemsList = [];
const reels = [
  document.getElementById("reel1"),
  document.getElementById("reel2"),
  document.getElementById("reel3")
];

let ITEM_HEIGHT = 80;
const stopTimes = [1000, 3000, 5000];

// 入力取得
function getItems(id) {
  return document.getElementById(id).value
    .split("\n")
    .filter(t => t.trim() !== "");
}

// 更新
function updateItems() {
  itemsList = [
    getItems("input1"),
    getItems("input2"),
    getItems("input3")
  ];

  reels.forEach((reel, i) => createReel(reel, itemsList[i]));

  setTimeout(() => {
    const el = document.querySelector(".item");
    if (el) ITEM_HEIGHT = el.offsetHeight;
  }, 0);
}

// 保存（手動）
function saveItems() {
  const data = {
    reel1: document.getElementById("input1").value,
    reel2: document.getElementById("input2").value,
    reel3: document.getElementById("input3").value
  };

  localStorage.setItem("slotData", JSON.stringify(data));
  alert("保存しました");

  updateItems();
}

// 読み込み
function loadItems() {
  const data = JSON.parse(localStorage.getItem("slotData"));
  if (!data) return;

  document.getElementById("input1").value = data.reel1 || "";
  document.getElementById("input2").value = data.reel2 || "";
  document.getElementById("input3").value = data.reel3 || "";

  updateItems();
}

// リセット
function clearItems() {
  localStorage.removeItem("slotData");

  document.getElementById("input1").value = "";
  document.getElementById("input2").value = "";
  document.getElementById("input3").value = "";

  updateItems();
}

// ===== 履歴 =====
function addHistory(text) {
  let history = JSON.parse(localStorage.getItem("history")) || [];

  history.unshift(text);
  if (history.length > 20) history.pop();

  localStorage.setItem("history", JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem("history")) || [];
  const el = document.getElementById("history");

  el.innerHTML = history.map(item =>
    `<div class="history-item">${item}</div>`
  ).join("");
}

function clearHistory() {
  localStorage.removeItem("history");
  renderHistory();
}

// 起動時
window.onload = () => {
  loadItems();
  renderHistory();
};

// リール生成
function createReel(reel, items) {
  reel.innerHTML = "";
  if (items.length === 0) return;

  for (let i = 0; i < 60; i++) {
    const div = document.createElement("div");
    div.className = "item";
    div.textContent = items[i % items.length];
    reel.appendChild(div);
  }
}

let spinning = false;

function spin() {
  if (spinning) return;
  if (itemsList.some(arr => arr.length === 0)) {
    alert("項目を入力してください");
    return;
  }

  spinning = true;
  const results = [];

  reels.forEach((reel, index) => {
    const items = itemsList[index];
    let position = 0;
    let speed = 40;

    const stopIndex = Math.floor(Math.random() * items.length);
    results.push(items[stopIndex]);

    const interval = setInterval(() => {
      position += speed;
      if (position >= items.length * ITEM_HEIGHT) position = 0;
      reel.style.transform = `translateY(-${position}px)`;
    }, 16);

    setTimeout(() => {
      const decelerate = setInterval(() => {

        if (index === 0) speed *= 0.9;
        else if (index === 1) speed *= 0.95;
        else speed *= 0.97;

        if (speed < 2) {
          clearInterval(decelerate);
          clearInterval(interval);

          reel.style.transform =
            `translateY(-${stopIndex * ITEM_HEIGHT}px)`;

          if (index === 2) {
            setTimeout(() => {
              const resultText = results.join(" / ");
              document.getElementById("result").textContent =
                "結果：" + resultText;

              addHistory(resultText); // ★履歴追加
              spinning = false;
            }, 300);
          }
        }
      }, 50);
    }, stopTimes[index]);
  });
}
</script>

</body>
</html>
